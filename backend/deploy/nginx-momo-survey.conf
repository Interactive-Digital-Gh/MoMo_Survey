# nginx site for the MoMo survey campaign.
# Serves the built React app and reverse-proxies /api to the Fastify service.
#
# 1) Add this rate-limit zone ONCE inside the top-level http { } block
#    (e.g. in /etc/nginx/nginx.conf):
#
#      limit_req_zone $binary_remote_addr zone=momo_api:10m rate=10r/s;
#
# 2) Install this file to /etc/nginx/sites-available/momo-survey and symlink
#    into sites-enabled, then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name survey.example.com;          # ← campaign domain
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name survey.example.com;          # ← campaign domain

    ssl_certificate     /etc/letsencrypt/live/survey.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/survey.example.com/privkey.pem;

    # Built frontend (output of `npm run build` → frontend/dist)
    root /opt/momo-survey/frontend/dist;
    index index.html;

    client_max_body_size 32k;                # survey payloads are tiny

    # API → Fastify (127.0.0.1:3001)
    location /api/ {
        limit_req zone=momo_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    # SPA fallback for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
